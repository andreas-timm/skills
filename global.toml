[skills]
db_path = "~/.local/share/skills/skills.sqlite"

[embed]
model = "nomic-ai/nomic-embed-text-v1.5"
models_dir = "~/.local/share/skills/models"
dim = 768
batch_size = 32
chunk_tokens = 512
chunk_overlap = 64
# Inference backend for embedding. "webgpu" runs on the GPU (Metal on Apple
# Silicon) and is the fastest option; "cpu" is the portable fallback. Avoid
# "coreml" — it recompiles per input shape and stalls on this batched workload.
device = "webgpu"
# Data type. "fp32" everywhere; GPU backends can also try "fp16".
dtype = "fp32"
