[skills]
db_path = "~/.local/share/skills/skills.sqlite"

[embed]
model = "nomic-ai/nomic-embed-text-v1.5"
models_dir = "~/.local/share/skills/models"
dim = 768
batch_size = 32
chunk_tokens = 512
chunk_overlap = 64
# Inference backend for embedding. "cpu" (ONNX Runtime CPU) is the portable
# default. On macOS arm64 (e.g. M-series), "coreml" or "webgpu" use the GPU /
# Neural Engine — both opt-in and may fall back to CPU for unsupported ops.
device = "cpu"
# Data type. CPU uses "fp32"; GPU/CoreML backends often prefer "fp16".
dtype = "fp32"
